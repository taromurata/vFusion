services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verkada
      POSTGRES_PASSWORD: verkada
      POSTGRES_DB: vfusion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verkada -d vfusion"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://verkada:verkada@postgres:5432/vfusion
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FERNET_KEY: ${FERNET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:15173}
      PUBLIC_WEBHOOK_BASE: ${PUBLIC_WEBHOOK_BASE:-}
      # Force UTF-8 everywhere. python:3.x slim images default to the
      # C/POSIX locale, which makes locale.getpreferredencoding()
      # return 'ANSI_X3.4-1968' (ASCII). Any library that emits a
      # log line / exception with non-ASCII chars (the google-genai
      # upload path is one — a status indicator like a check-mark
      # bombs the worker on encode) crashes the call. PYTHONUTF8=1
      # is the canonical fix for Python 3.7+; LANG/LC_ALL backstop
      # any subprocess or C-extension that reads the system locale.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "18080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - webhook_assets:/app/data
      # Persisted FERNET_KEY lives here when FERNET_KEY env is unset.
      # Survives container/image rebuilds; back up this volume for DR.
      - vfusion_secrets:/app/secrets
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://verkada:verkada@postgres:5432/vfusion
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY:-}
      # See backend service: forces UTF-8 throughout the worker
      # process so Gemini SDK log lines / file-upload metadata with
      # non-ASCII chars (status check-marks, etc.) don't blow up
      # encode().
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - webhook_assets:/app/data
      # Same key the backend uses — worker needs to decrypt API keys
      # to run actions against Verkada / Gemini.
      - vfusion_secrets:/app/secrets
    command: arq app.worker.WorkerSettings

  # Cloudflare Tunnel — production mode. Stable URL on your own domain.
  # Requires CF_TUNNEL_TOKEN in .env. See README "Production deploy".
  #   docker compose --profile cloudflared up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:-}
    depends_on:
      - backend
    profiles: ["cloudflared"]

  # Quick-mode path filter. Sits between cloudflared-quick and the
  # backend so the trycloudflare URL only exposes /hooks/verkada (the
  # path Verkada Command actually POSTs to). Everything else returns
  # 404 — locks down /api/*, the dashboard, and synthetic /hooks/<slug>
  # paths from accidental URL leaks. LAN traffic (port 18080 → backend)
  # is unaffected.
  caddy-quick:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./caddy/quick.Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
    profiles: ["quick"]

  # Cloudflare TryCloudflare — quick mode. Ephemeral random URL, no
  # account, no domain. The URL changes every restart, so don't point
  # production Verkada webhooks at this. Useful for kicking the tires
  # end-to-end without setting up DNS. The backend's /api/config endpoint
  # reads the assigned hostname from cloudflared's metrics endpoint and
  # surfaces it in the Webhook Inbox banner.
  # Points at caddy-quick (path-filtered) rather than backend directly,
  # so a leaked trycloudflare URL can't be used to hit /api/*.
  #   docker compose --profile quick up -d
  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 --url http://caddy-quick:8080
    depends_on:
      - caddy-quick
    profiles: ["quick"]

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:18080}
    ports:
      - "15173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Force a full re-install on every startup. The bind mount above
    # echoes package-lock.json back to the host, and npm's broken
    # optional-deps handling (bug #4828) means that a single bad lock
    # state can persist across restarts forever — even after the
    # anonymous node_modules volume is wiped, because npm sees a lock
    # file and reports "up to date" without ever installing the
    # missing platform-specific rollup binary.
    #
    # Trade-off: ~30s startup instead of <1s. Worth it for the
    # reliability — vFusion is restarted infrequently in production.
    # --include=optional belt-and-suspenders the rollup native bin.
    # find -mindepth 1 clears the *contents* of node_modules, not the
    # directory itself — necessary because /app/node_modules is the
    # anonymous-volume mount point and ``rm -rf node_modules`` fails
    # with "Device or resource busy".
    command: >
      sh -c "find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null;
             rm -f package-lock.json;
             npm install --no-audit --no-fund --include=optional &&
             npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  webhook_assets:
  vfusion_secrets:
